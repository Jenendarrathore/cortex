# Dev override — hot-reload backend/worker/mcp from your working tree.
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  backend:
    command: ["uvicorn", "api.server:app", "--host", "0.0.0.0", "--port", "8002", "--reload"]
    volumes:
      - ./rag-backend:/app/rag-backend
      - ./mcp:/app/mcp

  worker:
    volumes:
      - ./rag-backend:/app/rag-backend
      - ./mcp:/app/mcp

  mcp:
    volumes:
      - ./mcp:/app/mcp
      - ./rag-backend:/app/rag-backend
